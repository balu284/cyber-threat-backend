# ============================================
# PRODUCTION CONFIGURATION
# ============================================

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/cyber_threat_intelligence
spring.datasource.username=prod_user
spring.datasource.password=${DB_PASSWORD:ChangeThisInProduction!123}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Server Configuration
server.port=8080
server.servlet.context-path=/api
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json

# JWT Configuration
jwt.secret=${JWT_SECRET:YourSuperSecureJWTSecretKeyForProduction2024!}
jwt.expiration=86400000

# Email Configuration (Configure based on your email provider)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${EMAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# File Upload Configuration
file.upload-dir=/app/uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# Logging Configuration
logging.level.com.cyberthreat=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=ERROR
logging.file.name=logs/cyber-threat-app.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Cache Configuration
spring.cache.type=simple
spring.cache.cache-names=threatIndicators,threatStats,userDevices

# External API Configuration
app.external-api.timeout=30000
app.threat-intelligence.update-interval=3600000

# Security Headers (Additional security in production)
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true

# Activate Production Profile
spring.profiles.active=prod

# ============================================
# PERFORMANCE OPTIMIZATIONS
# ============================================

# Database Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# JPA Optimization
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true

# ============================================
# MONITORING & MANAGEMENT
# ============================================

# Actuator Endpoints (for monitoring)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true