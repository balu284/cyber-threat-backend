spring.profiles.active=prod
# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/cyber_threat_intelligence
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=${PORT:8080}

# JWT Secret Key
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Allow circular references
spring.main.allow-circular-references=true

# Cache Configuration
spring.cache.type=simple

# External API Timeout Configuration
app.external-api.timeout=10000

# Threat Intelligence Update Intervals
app.threat-intelligence.update-interval=1800000

# Logging Configuration
logging.level.com.cyberthreat=DEBUG
logging.level.org.springframework.security=DEBUG
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

# Agent storage path
agent.storage.path=agents/

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ========== GOOGLE OAUTH CONFIGURATION ==========
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile,https://www.googleapis.com/auth/gmail.readonly
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.client-name=Google

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=email
spring.security.oauth2.client.provider.google.jwk-set-uri=https://www.googleapis.com/oauth2/v3/certs

# ========== GMAIL API CONFIGURATION ==========
google.gmail.application-name=Cyber Threat Intelligence
google.client-id=${GOOGLE_CLIENT_ID}
google.client-secret=${GOOGLE_CLIENT_SECRET}
google.redirect-uri=${BACKEND_URL}/api/gmail/callback

# ========== GMAIL MONITORING CONFIGURATION ==========
gmail.monitoring.enabled=true
gmail.monitoring.interval=300000
gmail.session.cleanup-days=30

# Frontend URL
app.frontend.url=${FRONTEND_URL}